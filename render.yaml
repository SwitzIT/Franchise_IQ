services:
  # ─── BACKEND ────────────────────────────────────────────────
  - type: web
    name: franchise-iq-backend
    env: docker
    region: ohio
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile

    envVars:
      - key: CORS_ORIGINS
        value: "https://franchise-iq-frontend.onrender.com"
      - key: DATA_DIR
        value: "/app/data"
      - key: AMENITIES_DIR
        value: "/app/amenities_cache"
      - key: UPLOADS_DIR
        value: "/app/uploads"
      - key: OUTPUTS_DIR
        value: "/app/outputs"
      - key: LOGS_DIR
        value: "/app/logs"

  # ─── FRONTEND ───────────────────────────────────────────────
  - type: web
    name: franchise-iq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        fromService:
          name: franchise-iq-backend
          type: web
          property: host   # ✅ FIXED

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
