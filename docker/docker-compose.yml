version: "3.9"

services:

  backend:
    build: ../backend
    container_name: franchiseiq_backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/../data
      - ../amenities_cache:/app/../amenities_cache
      - ../uploads:/app/../uploads
      - ../outputs:/app/../outputs
      - ../logs:/app/../logs
    environment:
      - DATA_DIR=/data
      - AMENITIES_DIR=/amenities_cache
      - UPLOADS_DIR=/uploads
      - OUTPUTS_DIR=/outputs
      - LOGS_DIR=/logs
      - CORS_ORIGINS=http://localhost:3000,http://frontend:80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ../frontend
    container_name: franchiseiq_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped

volumes:
  data:
  amenities_cache:
  uploads:
  outputs:
  logs:
